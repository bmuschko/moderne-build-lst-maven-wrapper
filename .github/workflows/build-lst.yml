name: Build LST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  resolve-cli-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - name: Resolve latest 3.x and 4.x Moderne CLI versions
        id: resolve
        run: |
          METADATA=$(curl -s https://repo1.maven.org/maven2/io/moderne/moderne-cli/maven-metadata.xml)
          LATEST_3X=$(echo "$METADATA" | grep '<version>3\.' | tail -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          LATEST_4X=$(echo "$METADATA" | grep '<version>4\.' | tail -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "versions=[\"$LATEST_3X\",\"$LATEST_4X\"]" >> "$GITHUB_OUTPUT"

  build-lst:
    needs: resolve-cli-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cli-version: ${{ fromJson(needs.resolve-cli-versions.outputs.versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Download Moderne CLI ${{ matrix.cli-version }}
        run: |
          curl -sSL -o moderne-cli.jar \
            "https://repo1.maven.org/maven2/io/moderne/moderne-cli/${{ matrix.cli-version }}/moderne-cli-${{ matrix.cli-version }}.jar"

      - name: Build LST
        run: |
          mod() { java -jar moderne-cli.jar "$@"; }
          mod build --no-download .
